<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: https: http:;" />
    <title>Sneat - Vue.js Admin Template</title>
    <!-- Отключаем SES lockdown для устранения ошибок -->
    <script>
      // Полностью отключаем SES lockdown и связанные функции
      if (typeof lockdown === 'function') {
        console.log('SES lockdown detected, replacing with no-op');
        window.lockdown = function() { console.log('SES lockdown disabled - no-op'); };
      }

      // Отключаем window.ses если существует
      if (window.ses) {
        console.log('SES object detected, disabling lockdown');
        window.ses.lockdown = function() { console.log('SES lockdown disabled'); };
        window.ses.evaluate = function() { console.log('SES evaluate disabled'); };
      }

      // Переопределяем глобальные SES функции
      window.Compartment = window.Compartment || function() { console.log('Compartment disabled'); };
      window.harden = window.harden || function(x) { return x; };

      // Предотвращаем дальнейшую инициализацию SES
      Object.defineProperty(window, 'ses', {
        get: function() { return null; },
        set: function() { console.log('Attempt to set SES blocked'); },
        configurable: false
      });

      // Обрабатываем ошибки lockdown-install.js
      window.addEventListener('error', function(e) {
        if (e.filename && e.filename.includes('lockdown-install')) {
          console.log('Blocked SES error from lockdown-install.js:', e.message);
          e.preventDefault();
          return false;
        }
      });

      // Перехватываем console.error для SES ошибок
      const originalConsoleError = console.error;
      console.error = function(...args) {
        if (args.some(arg => typeof arg === 'string' && (arg.includes('SES') || arg.includes('lockdown') || arg.includes('unpermitted intrinsics') || arg.includes('UNCAUGHT_EXCEPTION')))) {
          console.log('Blocked SES console error:', ...args);
          return;
        }
        originalConsoleError.apply(console, args);
      };

      // Мониторим загрузку скриптов
      const originalAppendChild = Element.prototype.appendChild;
      Element.prototype.appendChild = function(child) {
        if (child.tagName === 'SCRIPT' && child.src && child.src.includes('lockdown-install')) {
          console.log('Blocked lockdown-install.js script loading');
          return child; // Возвращаем объект, но не добавляем его
        }
        return originalAppendChild.call(this, child);
      };

      // Переопределяем fetch для блокировки загрузки lockdown скриптов
      const originalFetch = window.fetch;
      window.fetch = function(url, options) {
        if (typeof url === 'string' && url.includes('lockdown-install')) {
          console.log('Blocked fetch request to lockdown-install.js');
          return Promise.reject(new Error('Blocked SES script'));
        }
        return originalFetch.call(this, url, options);
      };

      // Переопределяем XMLHttpRequest
      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...args) {
        if (typeof url === 'string' && url.includes('lockdown-install')) {
          console.log('Blocked XMLHttpRequest to lockdown-install.js');
          throw new Error('Blocked SES script request');
        }
        return originalOpen.call(this, method, url, ...args);
      };

      console.log('SES lockdown protection initialized');
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
